// 검색 기능 함수
function searchPlant() {
    const input = document.getElementById("searchInput").value.trim();
    const resultCard = document.getElementById("resultCard");
    const noResult = document.getElementById("noResult");
    const grid = document.getElementById("lifecycleGrid");

    if (plantData[input]) {
        noResult.style.display = "none";
        resultCard.style.display = "block";
        
        document.getElementById("resName").innerText = input;
        document.getElementById("resType").innerText = plantData[input].type;
        
        // 유튜브 링크 자동 연동
        document.getElementById("videoLink").href = `https://www.youtube.com/results?search_query=초등+3학년+${encodeURIComponent(input)}+한살이`;

        // 교과서 기준 6단계 동적 출력
        grid.innerHTML = "";
        for(let i = 0; i < 6; i++) {
            const stepDiv = document.createElement("div");
            stepDiv.className = "step";
            stepDiv.innerHTML = `
                <div>
                    <span class="step-num">${i+1}단계</span>
                    <div class="step-title">${plantData[input].titles[i]}</div>
                </div>
                <div class="step-icon-box">${plantData[input].icons[i]}</div>
                <div class="step-desc">${plantData[input].steps[i]}</div>
            `;
            grid.appendChild(stepDiv);
        }
    } else {
        resultCard.style.display = "none";
        noResult.style.display = "block";
    }
}

function quickSearch(name) {
    document.getElementById("searchInput").value = name;
    searchPlant();
}
